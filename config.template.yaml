      Software engineering, machine learning and infrastructure: writing
      and debugging code, deployment, containerisation, neural networks,
      inference, tokenisation, data serialisation, microservices, CI/CD,
      automated testing, refactoring, Git, Docker, Kubernetes, APIs.
      The practical discipline of building computational systems from
      architecture to production.

levels:
  core: 1
  pattern: 2
  module: 3
  quant: 4
  artifact: 5

thresholds:
  # Minimum spread between max and min cosine scores to attempt classification.
  # If spread < sign_spread, the note is equidistant from all cores → sign is not assigned.
  sign_spread: 0.05

  # Minimum absolute cosine between the note and its closest core.
  # If max_cosine >= confident_cosine → sign_source = "auto" (reliable).
  # If max_cosine < confident_cosine → sign_source = "weak_auto" (relative best-guess).
  # Effect on bridges: weak_auto signs do NOT block semantic bridges to the same core —
  # the domain identity is uncertain, so cross-domain connections are still proposed.
  # Tune this to your embedding model: nomic-embed baseline is ~0.74–0.83, so 0.75 is
  # tight. For models with lower baseline (e5, BGE), 0.5–0.6 is more appropriate.
  confident_cosine: 0.6

  # Minimum normalized percentage for a core to appear in the sign.
  # After spread-normalization: if adjusted_score / total * 100 >= this threshold,
  # the core is included. Allows compound signs like "SE" when two cores both score ≥ 30%.
  pattern_second_sign_threshold: 30.0

  # Minimum cosine similarity between two notes to propose a semantic bridge.
  # Only proposed between notes with different core signs (cross-domain links).
  semantic_bridge_threshold: 0.55

  # Minimum cosine similarity to auto-link a file to a parent.
  # Used by process_orphans and add_entity when auto_parents=true.
  # Raw cosine only — ensures meaningful semantic proximity.
  # Matching domain is used only as a tiebreaker, not as a score booster.
  parent_link_threshold: 0.55

  # Confidence threshold for spread-normalized sign classification.
  # If the dominant core's adjusted percentage >= confident_spread,
  # sign_source = "auto"; otherwise sign_source = "weak_auto".
  confident_spread: 60.0

# Artifact signs are heuristic labels, not embedding etalons.
# L5 artifacts get one of these signs by content-structure rules.
# L4 quants can include artifact_sign as the horizontal part of a composite sign.
# Public convention: domains use uppercase signs (S/D/E), material types use
# lowercase signs (n/c/r/l/u/h/s). You may change them, but keep signs short
# and avoid conflicts with domain signs.
# Optional `keywords` may be added to any item to override the built-in RU/EN
# detection words for that material type.
artifact_signs:
  - sign: n
    name: Note
    text: "Short note, observation, fragment."
  - sign: c
    name: Concept
    text: "Definition, concept, entity description."
  - sign: r
    name: Reference
    text: "External source, documentation, link, citation."
  - sign: l
    name: Log
    text: "Session log, chronology, dialogue record."
  - sign: u
    name: Update
    text: "Update, release note, changelog entry."
  - sign: h
    name: Hypothesis
    text: "Hypothesis, assumption, speculative idea."
  - sign: s
    name: Specification
    text: "Technical specification, instruction, requirements."

# Extra sign characters for parsing entity names (beyond etalon and artifact signs).
# Used to extract signs from filenames like "S Thermodynamics" or "SE System".
# This is ONLY for name parsing, NOT for classification.
sign_chars: ""
